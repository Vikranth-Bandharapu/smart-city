<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register an account on the UrbanNexus Smart Infrastructure platform.">
    <title>Sign Up | UrbanNexus Municipal Console</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">


    <div class="auth-card glass-card">
        <div class="auth-header">
            <img src="Assests/logo.webp" alt="UrbanNexus Logo">
            <h2>Create Account</h2>
            <p>Access the smart city telemetry console</p>
        </div>

        <!-- Alert messages box -->
        <div class="auth-message" id="auth-message"></div>

        <form id="signup-form">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Municipal / Business Email</label>
                <input type="email" id="email" placeholder="j.doe@citygov.org" required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password" style="margin-bottom: 0.5rem;">Password</label>
                    <a href="404.html" class="forgot-password-link" style="font-size: 0.8rem; color: var(--primary); text-decoration: none; margin-bottom: 0.5rem;">Forgot Password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="At least 6 characters" required style="padding-right: 2.75rem;">
                    <button type="button" class="password-toggle" aria-label="Toggle Password Visibility" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; outline: none; z-index: 10;">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirm-password" placeholder="Re-enter password" required style="padding-right: 2.75rem;">
                    <button type="button" class="password-toggle" aria-label="Toggle Confirm Password Visibility" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; outline: none; z-index: 10;">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="auth-signup-submit" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have a console account? <a href="login.html">Log in here</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="main.js"></script>
    <script src="auth.js"></script>
</body>
</html>
